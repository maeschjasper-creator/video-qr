<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

#video{
    width:100vw;
    height:100vh;
    object-fit:cover;
    background:#000;
}

#overlay{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.4);
    cursor:pointer;
    transition:.4s;
}

#button{
    background:white;
    color:black;
    padding:18px 35px;
    border-radius:50px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="overlay">
    <div id="button">▶ Video starten</div>
</div>

<video id="video" playsinline preload="auto">
    <source src="video.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");

overlay.addEventListener("click", async () => {

    overlay.style.display="none";

    await video.play();

    if(video.requestFullscreen){
        video.requestFullscreen();
    }else if(video.webkitEnterFullscreen){
        video.webkitEnterFullscreen(); // iPhone
    }
});
</script>

</body>
</html>
